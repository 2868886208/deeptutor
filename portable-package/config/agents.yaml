# DeepTutor per-capability model routing config
# Chat/Research 用 Flash（便宜），Deep Solve 用 Pro（深度推理）
# 不设 model 的能力自动走全局默认模型

capabilities:
  chat:
    temperature: 0.2
    max_rounds: 5
    exploring:
      max_tokens: 1200
    responding:
      max_tokens: 6000
    model: "deepseekv4-flash"

  solve:
    temperature: 0.3
    max_tokens: 6000
    max_rounds: 8
    max_replans: 1
    model: "deepseekv4-pro"

  research:
    temperature: 0.5
    max_tokens: 8000
    tool_timeout: 40
    tool_max_retries: 1
    model: "deepseekv4-flash"

  question:
    temperature: 0.7
    max_tokens: 3000
    exploring:
      max_iterations: 5

  co_writer:
    temperature: 0.7
    max_tokens: 3000

  visualize:
    temperature: 0.4
    max_tokens: 12000

tools:
  brainstorm:
    temperature: 0.8
    max_tokens: 1500

services:
  personalization:
    temperature: 0.5
    max_tokens: 6000

plugins:
  vision_solver:
    temperature: 0.3
    max_tokens: 8000
  math_animator:
    temperature: 0.4
    max_tokens: 8000
